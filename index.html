<!DOCTYPE html>
<html>
<head>
  <title>Simple POS System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 10px;
    }

    h1 {
      font-size: 26px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 6px 0;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: white;
      background: #4CAF50;
    }

    button:active {
      transform: scale(0.98);
    }

    .controls button {
      width: 48%;
      display: inline-block;
    }

    .undo { background: #ff9800; }
    .reset { background: #f44336; }

    .box {
      background: white;
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      font-size: 16px;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>🍹 Simple POS System</h1>

<div class="controls">
  <button class="undo" onclick="undo()">↩ Undo</button>
  <button class="reset" onclick="resetDay()">🔄 Reset</button>
</div>

<hr>

<!-- PRODUCT BUTTONS -->

<button onclick="add('mango12')">Mango Shake 12oz - ₱60</button>
<button onclick="add('mango16')">Mango Shake 16oz - ₱70</button>

<button onclick="add('melon12')">Melon Shake 12oz - ₱60</button>
<button onclick="add('melon16')">Melon Shake 16oz - ₱70</button>

<button onclick="add('straw12')">Strawberry Shake 12oz - ₱60</button>
<button onclick="add('straw16')">Strawberry Shake 16oz - ₱70</button>

<button onclick="add('water12')">Watermelon Shake 12oz - ₱60</button>
<button onclick="add('water16')">Watermelon Shake 16oz - ₱70</button>

<button onclick="add('siomai')">Siomai - ₱40</button>
<button onclick="add('fries')">Fries - ₱30</button>
<button onclick="add('hungarian')">Hungarian - ₱70</button>
<button onclick="add('cheeseBurger')">Cheese Burger - ₱70</button>
<button onclick="add('quarter')">Quarter Pounder - ₱90</button>
<button onclick="add('dynamite')">Dynamite - ₱60</button>
<button onclick="add('cheeseStick')">Cheese Stick - ₱30</button>

<!-- OUTPUT -->

<div class="box">
  <h3>📊 Sales Per Product</h3>
  <div id="output">No sales yet</div>
</div>

<div class="box">
  <h3>💰 Total Sales</h3>
  ₱<span id="total">0</span>
</div>

<script>
const prices = {
  mango12: 60, mango16: 70,
  melon12: 60, melon16: 70,
  straw12: 60, straw16: 70,
  water12: 60, water16: 70,
  siomai: 40, fries: 30,
  hungarian: 70, cheeseBurger: 70,
  quarter: 90, dynamite: 60,
  cheeseStick: 30
};

const names = {
  mango12: "Mango 12oz",
  mango16: "Mango 16oz",
  melon12: "Melon 12oz",
  melon16: "Melon 16oz",
  straw12: "Strawberry 12oz",
  straw16: "Strawberry 16oz",
  water12: "Watermelon 12oz",
  water16: "Watermelon 16oz",
  siomai: "Siomai",
  fries: "Fries",
  hungarian: "Hungarian",
  cheeseBurger: "Cheese Burger",
  quarter: "Quarter Pounder",
  dynamite: "Dynamite",
  cheeseStick: "Cheese Stick"
};

let sales = {};
let history = [];

function add(item) {
  if (!sales[item]) sales[item] = 0;

  sales[item]++;
  history.push(item);

  update();
}

function undo() {
  if (history.length === 0) return;

  let last = history.pop();
  sales[last]--;

  if (sales[last] <= 0) {
    delete sales[last];
  }

  update();
}

function resetDay() {
  sales = {};
  history = [];
  update();
}

function update() {
  let total = 0;
  let html = "";

  for (let item in sales) {
    let count = sales[item];
    let subtotal = count * prices[item];

    total += subtotal;

    html += `
      <div>
        ${names[item]}: <b>${count}</b> × ₱${prices[item]} = ₱${subtotal}
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html || "No sales yet";
  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
